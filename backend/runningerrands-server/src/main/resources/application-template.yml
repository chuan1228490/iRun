# ==================== 开发环境配置模板 ====================
# 使用方法：
#   1. 复制本文件为 application-dev.yml
#   2. 根据本地环境填写下方占位符
#   3. application-dev.yml 已在 .gitignore 中，不会被提交
#
# 环境变量优先级：系统环境变量 > application-dev.yml 默认值

spring:
  # ===== MySQL 数据库 =====
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # url 格式：jdbc:mysql://<主机>:<端口>/<库名>?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/runningerrands?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:你的数据库密码}
    hikari:
      maximum-pool-size: 10   # 最大连接数
      minimum-idle: 5         # 最小空闲连接

  # ===== Redis =====
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}            # 无密码则留空
      database: ${REDIS_DATABASE:1}           # 默认使用 db1
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # ===== 热部署（仅开发环境生效） =====
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java

# ===== Knife4j/Swagger API 文档（仅开发环境启用） =====
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
knife4j:
  enable: true
  setting:
    language: zh_cn

# ===== 个人/环境相关覆盖 =====
# 以下配置因开发者或环境不同而异，覆盖 application.yml 中的对应项
runningerrands:
  # 阿里云 OSS（个人开发桶）
  alioss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    bucket-name: ${ALIYUN_OSS_BUCKET:你的OSS桶名}
