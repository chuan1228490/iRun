# Docker 环境专用配置
# 通过 docker-compose 启动时自动激活（SPRING_PROFILES_ACTIVE=docker）

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/runningerrands?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8
    username: root
    password: ${MYSQL_ROOT_PASSWORD:root123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  data:
    redis:
      host: redis
      port: 6379
      database: 1
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  devtools:
    restart:
      enabled: false

springdoc:
  api-docs:
    enabled: false
knife4j:
  enable: false

logging:
  level:
    com.ikeu: INFO
