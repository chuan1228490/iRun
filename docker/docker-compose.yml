services:
  mysql:
    image: mysql:8.0
    container_name: rr-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: runningerrands
    ports:
      - "${MYSQL_PORT:-3308}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../backend/runningerrands.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - rr-net

  redis:
    image: redis:7-alpine
    container_name: rr-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6381}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - rr-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: rr-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      RUNNING_ERRANDS_JWT_ADMIN_SECRET: ${JWT_ADMIN_SECRET:-docker-admin-secret-key-min-32chars!}
      RUNNING_ERRANDS_JWT_USER_SECRET: ${JWT_USER_SECRET:-docker-user-secret-key-min-32chars!!}
      ALIYUN_ACCESS_KEY_ID: ${ALIYUN_ACCESS_KEY_ID:-}
      ALIYUN_ACCESS_KEY_SECRET: ${ALIYUN_ACCESS_KEY_SECRET:-}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      TENCENT_MAP_API_KEY: ${TENCENT_MAP_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rr-net

volumes:
  mysql_data:
  redis_data:

networks:
  rr-net:
    driver: bridge
